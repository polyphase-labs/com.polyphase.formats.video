# Native Addon Release Workflow
# Triggers on tags matching v*
# Builds Release for Windows and Linux (+ Linux Debug), publishes release assets
#
# Addon name is read automatically from package.json (native.binaryName or name)
#
# Linux uses the polyphaselabs/polyphase-engine Docker image which has the
# engine source + prebuilt static libs + Vulkan SDK + GCC 12 + all system deps
# baked in. No clone needed.
#
# Windows downloads polyphase-sdk-windows-x64.zip from the engine repo's
# latest GitHub release. The zip contains engine headers + import libs
# (Polyphase.lib, Lua.lib) — everything the linker needs to resolve the
# __declspec(dllimport) engine symbols an addon DLL touches. We do NOT
# clone the engine source: without import libs the link fails with ~220
# LNK2019/LNK2001 errors against every __imp_* engine symbol.
#
# Usage:
#   1. Copy this entire .dev/workflows/ folder to your addon's .github/workflows/
#   2. Tag a release: git tag v1.0.0 && git push origin v1.0.0
#
# Local testing:
#   Windows: set POLYPHASE_PATH=C:\path\to\engine && .github\workflows\build.bat
#            (POLYPHASE_PATH may point at either an SDK extraction or a
#            local engine source-tree build; build.bat probes both layouts.)
#   Linux:   POLYPHASE_PATH=/path/to/engine ./.github/workflows/build.sh
#
# Output assets (Windows ships Release only; the SDK zip bundles Release-CRT
# engine libs only, so the Debug-CRT addon link is skipped. The editor's
# NativeAddonManager source-compiles Debug addons at runtime when no Debug
# binary is shipped, so Debug-flavor editors aren't blocked):
#   - <name>-Windows-x64-Release.dll
#   - lib<name>-Linux-x64-Release.so
#   - lib<name>-Linux-x64-Debug.so

name: Native Addon Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Polyphase engine repo. Windows downloads polyphase-sdk-windows-x64.zip
  # from this repo's GitHub Releases for headers + import libs. Override
  # per fork that publishes the SDK under a different namespace.
  POLYPHASE_REPO: "Polyphase-Labs/Polyphase-Engine"
  # Optional: pin a specific engine release tag to source the SDK zip from
  # (e.g. "v6.2.0-beta.5"). Leave empty to auto-pick the most recent release
  # that has the asset attached, including prereleases. Pin this when an
  # addon needs to track a known-good engine API version.
  POLYPHASE_SDK_TAG: ""
  # Docker image with engine pre-built (used by Linux job)
  POLYPHASE_ENGINE_IMAGE: polyphaselabs/polyphase-engine:latest

jobs:
  # =========================================================================
  #  Linux: Build inside the polyphase-engine Docker container.
  #  Engine source is already at /polyphase/. All system deps (libxcb,
  #  Vulkan SDK, GCC 12) are baked into the image.
  # =========================================================================
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: polyphaselabs/polyphase-engine:latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Read addon name from package.json
        run: |
          # open(..., encoding='utf-8-sig') strips a leading UTF-8 BOM if
          # present, so package.json files saved by Windows editors as
          # "UTF-8 with BOM" don't trip json.load with JSONDecodeError
          # "Unexpected UTF-8 BOM" on Linux / "Expecting value" on Windows.
          ADDON_NAME=$(python3 -c "import json; d=json.load(open('package.json', encoding='utf-8-sig')); print(d.get('native',{}).get('binaryName') or d.get('name'))")
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV
          echo "Addon name: $ADDON_NAME"

      - name: Build Both Configs (Linux)
        run: |
          chmod +x .github/workflows/build.sh
          export POLYPHASE_PATH="/polyphase"
          ./.github/workflows/build.sh "$ADDON_NAME" Both

      - name: Upload Linux Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Linux-x64-Release
          path: |
            build/Linux/x64/Release/lib${{ env.ADDON_NAME }}.so
            build/Linux/x64/Release/*.sha256

      - name: Upload Linux Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Linux-x64-Debug
          path: |
            build/Linux/x64/Debug/lib${{ env.ADDON_NAME }}.so
            build/Linux/x64/Debug/*.sha256

  # =========================================================================
  #  Windows: Download the Polyphase SDK zip (headers + Polyphase.lib +
  #  Lua.lib), install Vulkan SDK, run build.bat. The SDK zip is published
  #  by the engine's release.yml via Installers/package_windows_sdk.py.
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read addon name from package.json
        id: addon-info
        shell: bash
        run: |
          # open(..., encoding='utf-8-sig') strips a leading UTF-8 BOM if
          # present, so package.json files saved by Windows editors as
          # "UTF-8 with BOM" don't trip json.load with JSONDecodeError
          # "Unexpected UTF-8 BOM" on Linux / "Expecting value" on Windows.
          ADDON_NAME=$(python3 -c "import json; d=json.load(open('package.json', encoding='utf-8-sig')); print(d.get('native',{}).get('binaryName') or d.get('name'))")
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV
          echo "Addon name: $ADDON_NAME"

      # Download the prebuilt Polyphase SDK zip from the engine repo. The
      # zip contains engine headers + import libs (Polyphase.lib, Lua.lib)
      # — everything the linker needs. Replaces cloning engine source and
      # trying to link without the .lib files (which produced ~220 LNK2019
      # unresolved-symbol errors). Layout: Installers/package_windows_sdk.py.
      #
      # Why we don't use /releases/latest: GitHub's `/releases/latest` endpoint
      # silently skips releases flagged as pre-release (the engine's `v*-beta.*`
      # tags all are), and additionally any non-`v*` tag (e.g. the engine's
      # `vulkan-sdk-<ver>` mirror tag) can win latest depending on flags. Result:
      # `/releases/latest/download/polyphase-sdk-windows-x64.zip` 404s on a
      # perfectly valid release. Instead we list releases via the API, sort
      # newest-first, and pick the first one that actually has the asset.
      # Override with POLYPHASE_SDK_TAG to pin a specific release tag.
      - name: Download Polyphase SDK
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo  = "${{ env.POLYPHASE_REPO }}"
          $asset = "polyphase-sdk-windows-x64.zip"
          $pin   = "${{ env.POLYPHASE_SDK_TAG }}"
          $headers = @{ "User-Agent" = "polyphase-addon-ci"; "Accept" = "application/vnd.github+json" }
          if ($env:GH_TOKEN) { $headers["Authorization"] = "Bearer $env:GH_TOKEN" }

          if ($pin) {
            Write-Host "Looking up pinned release tag '$pin' on $repo"
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$pin" -Headers $headers
          } else {
            Write-Host "Querying $repo releases for one containing '$asset'"
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=30" -Headers $headers
            $release = $releases | Where-Object { $_.assets.name -contains $asset } | Select-Object -First 1
            if (-not $release) {
              throw "No release on $repo has '$asset' attached. Cut a release from a tag that contains Installers/package_windows_sdk.py, or set POLYPHASE_SDK_TAG to a specific tag that does."
            }
          }

          $a = $release.assets | Where-Object { $_.name -eq $asset } | Select-Object -First 1
          if (-not $a) {
            throw "Release '$($release.tag_name)' on $repo has no asset named '$asset'."
          }

          $url = $a.browser_download_url
          $zip = "$env:RUNNER_TEMP\polyphase-sdk.zip"
          $dst = "..\polyphase-engine"
          Write-Host "Using release '$($release.tag_name)' (prerelease=$($release.prerelease))"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -UserAgent "Mozilla/5.0"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          if (-not (Test-Path "$dst\Lib\Windows\x64\ReleaseEditor\Polyphase.lib")) {
            throw "SDK extract failed: Polyphase.lib missing under $dst\Lib\Windows\x64\ReleaseEditor\"
          }
          if (-not (Test-Path "$dst\Lib\Windows\x64\ReleaseEditor\Lua.lib")) {
            throw "SDK extract failed: Lua.lib missing under $dst\Lib\Windows\x64\ReleaseEditor\"
          }
          Write-Host "SDK extracted successfully."

      # Vulkan SDK install is delegated to the engine repo's composite action
      # so every addon stays in lockstep with whatever version the engine
      # currently ships. When the engine bumps versions it republishes the
      # mirrored zip on a new `vulkan-sdk-<ver>` release tag and updates the
      # action's default — this workflow needs no edit to pick up the bump.
      # Pin to a tag instead of @main if you want change isolation
      # (e.g. @v6.2.0 — matches the engine release this addon was tested
      # against).
      - name: Install Vulkan SDK
        uses: Polyphase-Labs/Polyphase-Engine/.github/actions/install-vulkan-sdk@main

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Both Configs (Windows)
        shell: cmd
        run: |
          set "POLYPHASE_PATH=..\polyphase-engine"
          call .github\workflows\build.bat %ADDON_NAME% Both

      - name: Upload Windows Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Windows-x64-Release
          path: |
            build/Windows/x64/Release/${{ env.ADDON_NAME }}.dll
            build/Windows/x64/Release/*.sha256

      # Best-effort: the Polyphase SDK zip only ships Release-CRT engine
      # import libs, so build.bat skips the Debug addon link unless the
      # engine fork has staged Debug libs into the SDK. When skipped, this
      # upload finds no files and warns rather than failing the workflow.
      # The editor's NativeAddonManager already source-compiles Debug
      # addons when no Debug binary is shipped (#if defined(_DEBUG)
      # fallback), so users aren't blocked.
      - name: Upload Windows Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Windows-x64-Debug
          if-no-files-found: warn
          path: |
            build/Windows/x64/Debug/${{ env.ADDON_NAME }}.dll
            build/Windows/x64/Debug/*.sha256
            build/Windows/x64/Debug/*.pdb

  # =========================================================================
  #  Release: Update package.json with binary descriptors, publish assets.
  # =========================================================================
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read addon name from package.json
        run: |
          # open(..., encoding='utf-8-sig') strips a leading UTF-8 BOM if
          # present, so package.json files saved by Windows editors as
          # "UTF-8 with BOM" don't trip json.load with JSONDecodeError
          # "Unexpected UTF-8 BOM" on Linux / "Expecting value" on Windows.
          ADDON_NAME=$(python3 -c "import json; d=json.load(open('package.json', encoding='utf-8-sig')); print(d.get('native',{}).get('binaryName') or d.get('name'))")
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update package.json with binary descriptors
        run: |
          sudo apt-get install -y jq
          BINARIES="[]"

          [ -f "artifacts/${{ env.ADDON_NAME }}-Windows-x64-Release/${{ env.ADDON_NAME }}.dll" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Windows", "arch": "x64", "config": "Release", "type": "releaseAsset", "value": "${{ env.ADDON_NAME }}-Windows-x64-Release.dll"}]')

          [ -f "artifacts/${{ env.ADDON_NAME }}-Windows-x64-Debug/${{ env.ADDON_NAME }}.dll" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Windows", "arch": "x64", "config": "Debug", "type": "releaseAsset", "value": "${{ env.ADDON_NAME }}-Windows-x64-Debug.dll"}]')

          [ -f "artifacts/${{ env.ADDON_NAME }}-Linux-x64-Release/lib${{ env.ADDON_NAME }}.so" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Linux", "arch": "x64", "config": "Release", "type": "releaseAsset", "value": "lib${{ env.ADDON_NAME }}-Linux-x64-Release.so"}]')

          [ -f "artifacts/${{ env.ADDON_NAME }}-Linux-x64-Debug/lib${{ env.ADDON_NAME }}.so" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Linux", "arch": "x64", "config": "Debug", "type": "releaseAsset", "value": "lib${{ env.ADDON_NAME }}-Linux-x64-Debug.so"}]')

          jq --argjson binaries "$BINARIES" '.binaries = $binaries | .resolveMode = "binary"' package.json > package.json.updated
          mv package.json.updated package.json

          echo "Updated package.json:"
          cat package.json

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            config="${artifact_name##*-}"
            platform_arch="${artifact_name%-*}"
            platform_arch="${platform_arch#*-}"

            for file in "$dir"*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                if [[ "$filename" == *.dll ]]; then
                  base="${filename%.dll}"
                  cp "$file" "release/${base}-${platform_arch}-${config}.dll"
                elif [[ "$filename" == *.so ]]; then
                  base="${filename%.so}"
                  cp "$file" "release/${base}-${platform_arch}-${config}.so"
                elif [[ "$filename" == *.pdb ]]; then
                  base="${filename%.pdb}"
                  cp "$file" "release/${base}-${platform_arch}-${config}.pdb"
                else
                  cp "$file" "release/"
                fi
              fi
            done
          done

          cp package.json "release/package.json"

          echo "Release files:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
